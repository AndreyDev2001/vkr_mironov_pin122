<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Категория</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/admin">Админ-панель</a>
        <a href="/admin/categories" class="btn btn-outline-light">Назад</a>
    </div>
</nav>

<div class="container">
    <h1 class="mb-4" th:text="${category.id == null} ? 'Новая категория' : 'Редактировать категорию'">Категория</h1>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form th:action="@{/admin/categories}" method="post" th:object="${category}">
        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
            <label class="form-label">Название категории *</label>
            <input type="text" th:field="*{name}" class="form-control" required
                   placeholder="Например: Смартфоны">
            <div class="form-text">Название обязательно для заполнения</div>
        </div>

        <div class="mb-3">
            <label class="form-label">Описание</label>
            <textarea th:field="*{description}" class="form-control" rows="4"
                      placeholder="Описание категории товаров"></textarea>
        </div>

        <button type="submit" class="btn btn-primary">Сохранить</button>
        <a href="/admin/categories" class="btn btn-secondary">Отмена</a>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
