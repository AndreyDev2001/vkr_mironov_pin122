<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пункт выдачи</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/admin">Админ-панель</a>
        <a href="/admin/pickup-points" class="btn btn-outline-light">Назад к списку</a>
    </div>
</nav>

<div class="container">
    <h1 class="mb-4" th:text="${point.id == null} ? 'Новый пункт выдачи' : 'Редактировать пункт выдачи'">
        Пункт выдачи
    </h1>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="card shadow-sm">
        <div class="card-body">
            <form th:action="@{/admin/pickup-points}" method="post" th:object="${point}">
                <input type="hidden" th:field="*{id}">

                <div class="row g-3">
                    <div class="col-md-12">
                        <label class="form-label">Название пункта *</label>
                        <input type="text" th:field="*{name}" class="form-control" required
                               placeholder="Например: Центральный офис">
                        <div class="form-text">Краткое название для отображения в списке.</div>
                    </div>

                    <div class="col-md-12">
                        <label class="form-label">Полный адрес *</label>
                        <textarea th:field="*{address}" class="form-control" rows="2" required
                                  placeholder="Город, улица, дом, офис"></textarea>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Телефон</label>
                        <input type="tel" th:field="*{phone}" class="form-control"
                               placeholder="+7 (999) 000-00-00">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Часы работы</label>
                        <input type="text" th:field="*{workingHours}" class="form-control"
                               placeholder="Пн-Пт: 09:00 - 18:00">
                    </div>
                </div>

                <div class="mt-4 d-flex gap-2">
                    <button type="submit" class="btn btn-primary px-4">Сохранить</button>
                    <a href="/admin/pickup-points" class="btn btn-secondary">Отмена</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
