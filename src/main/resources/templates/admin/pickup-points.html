<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пункты выдачи</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/admin">Админ-панель</a>
        <a href="/admin" class="btn btn-outline-light">Назад</a>
    </div>
</nav>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Пункты выдачи товара</h1>
        <a href="/admin/pickup-points/new" class="btn btn-primary">Добавить пункт</a>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="table-responsive">
        <table class="table table-striped table-hover">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Название</th>
                <th>Адрес</th>
                <th>Телефон</th>
                <th>Часы работы</th>
                <th>Действия</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="point : ${points}">
                <td th:text="${point.id}">1</td>
                <td th:text="${point.name}">Название</td>
                <td th:text="${point.address}">Адрес</td>
                <td th:text="${point.phone}">+7...</td>
                <td th:text="${point.workingHours}">09:00-18:00</td>
                <td>
                    <div class="btn-group" role="group">
                        <a th:href="@{/admin/pickup-points/{id}/edit(id=${point.id})}"
                           class="btn btn-sm btn-warning">Изменить</a>

                        <form th:action="@{/admin/pickup-points/{id}/delete(id=${point.id})}"
                              method="post" style="display:inline;"
                              onsubmit="return confirm('Вы уверены, что хотите удалить этот пункт выдачи?')">
                            <button type="submit" class="btn btn-sm btn-danger">Удалить</button>
                        </form>
                    </div>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(points)}">
                <td colspan="6" class="text-center text-muted py-4">
                    Пункты выдачи не найдены. Добавьте первый пункт.
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
