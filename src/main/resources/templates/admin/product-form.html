<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Товар</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/admin">Админ-панель</a>
        <a href="/admin/products" class="btn btn-outline-light">Назад</a>
    </div>
</nav>

<div class="container">
    <h1 class="mb-4" th:text="${product.id == null} ? 'Новый товар' : 'Редактировать товар'">Товар</h1>

    <form th:action="@{/admin/products}" method="post" th:object="${product}">
        <input type="hidden" th:field="*{id}">

        <div class="row">
            <div class="col-md-6">
                <div class="mb-3">
                    <label class="form-label">Название *</label>
                    <input type="text" th:field="*{name}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Категория *</label>
                    <select th:field="*{categoryId}" class="form-select" required>
                        <option value="">Выберите категорию</option>
                        <option th:each="cat : ${categories}"
                                th:value="${cat.id}"
                                th:text="${cat.name}">Категория</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Цена (₽) *</label>
                    <input type="number" step="0.01" th:field="*{price}" class="form-control" required min="0.01">
                </div>

                <div class="mb-3">
                    <label class="form-label">Количество *</label>
                    <input type="number" th:field="*{quantity}" class="form-control" required min="0">
                </div>
            </div>

            <div class="col-md-6">
                <div class="mb-3">
                    <label class="form-label">URL изображения</label>
                    <input type="url" th:field="*{imageUrl}" class="form-control" placeholder="https://...">
                </div>

                <div class="mb-3">
                    <label class="form-label">Описание</label>
                    <textarea th:field="*{description}" class="form-control" rows="4"></textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label">Характеристики</label>
                    <textarea th:field="*{characteristics}" class="form-control" rows="4"
                              placeholder="Экран: 6.5&#10;Память: 128ГБ"></textarea>
                </div>
            </div>
        </div>

        <button type="submit" class="btn btn-primary">Сохранить</button>
        <a href="/admin/products" class="btn btn-secondary">Отмена</a>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
