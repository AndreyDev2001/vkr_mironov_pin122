<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Корзина</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">ElectroShop</a>
        <a href="/products/" class="btn btn-outline-light">В магазин</a>
    </div>
</nav>

<div class="container">
    <h1 class="mb-4">Ваша корзина</h1>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div th:if="${cart.items.isEmpty()}">
        <div class="alert alert-info text-center">
            <p class="mb-0">Ваша корзина пуста. <a href="/products/">Перейти к покупкам</a></p>
        </div>
    </div>

    <div th:if="${!cart.items.isEmpty()}">
        <table class="table table-hover">
            <thead>
            <tr>
                <th>Товар</th>
                <th>Цена</th>
                <th>Количество</th>
                <th>Сумма</th>
                <th>Действия</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item : ${cart.items}">
                <td>
                    <div class="d-flex align-items-center">
                        <img th:src="${item.imageUrl != null ? item.imageUrl : 'https://via.placeholder.com/50'}"
                             alt="Img" class="me-3" style="width: 50px; height: 50px; object-fit: cover;">
                        <span th:text="${item.name}">Название товара</span>
                    </div>
                </td>
                <td th:text="${item.price} + ' ₽'">0 ₽</td>
                <td th:text="${item.quantity}">1</td>
                <td th:text="${item.totalPrice} + ' ₽'">0 ₽</td>
                <td>
                    <form th:action="@{/cart/remove/{id}(id=${item.productId})}" method="post">
                        <button type="submit" class="btn btn-sm btn-danger">Удалить</button>
                    </form>
                </td>
            </tr>
            </tbody>
            <tfoot>
            <tr>
                <td colspan="3" class="text-end"><strong>Итого:</strong></td>
                <td colspan="2"><strong th:text="${cart.totalAmount} + ' ₽'">0 ₽</strong></td>
            </tr>
            </tfoot>
        </table>

        <div class="d-flex justify-content-end gap-3">
            <a href="/products/" class="btn btn-secondary">Продолжить покупки</a>
            <form th:action="@{/cart/checkout}" method="post">
                <button type="submit" class="btn btn-success btn-lg">Оформить заказ</button>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
