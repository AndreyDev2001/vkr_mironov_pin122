<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Выбор пункта выдачи</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2>Выберите пункт выдачи</h2>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form th:action="@{/cart/confirm-order}" method="post" class="mt-4">
        <div class="list-group">
            <div th:each="point : ${pickupPoints}" class="list-group-item list-group-item-action">
                <div class="d-flex w-100 justify-content-between align-items-center">
                    <div>
                        <h5 class="mb-1">
                            <input type="radio" name="pickupPointId" th:value="${point.id}" required
                                   th:id="'point'+${point.id}" class="me-2">
                            <label th:for="'point'+${point.id}" th:text="${point.name}">Название</label>
                        </h5>
                        <p class="mb-1 text-muted" th:text="${point.address}">Адрес</p>
                        <small th:text="'Часы работы: ' + ${point.workingHours}">Время</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mt-4 p-3 bg-light">
            <h5>Итого к оплате: <span th:text="${cart.totalAmount} + ' ₽'"></span></h5>
        </div>

        <button type="submit" class="btn btn-success btn-lg mt-3">Подтвердить заказ</button>
        <a href="/cart" class="btn btn-secondary btn-lg mt-3">Назад в корзину</a>
    </form>
</div>
</body>
</html>
