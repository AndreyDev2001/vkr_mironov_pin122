<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>История заказов</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<!-- Навигация -->
<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">Электроника</a>
        <a href="/profile" class="btn btn-outline-light">← Назад в профиль</a>
    </div>
</nav>

<div class="container mt-4">
    <h2 class="mb-4">История заказов</h2>

    <!-- Блок ошибок -->
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <!-- ФОРМА ФИЛЬТРАЦИИ -->
    <div class="card mb-4 bg-light border-primary">
        <div class="card-header bg-primary text-white">
            <i class="bi bi-funnel"></i> Фильтр по периоду
        </div>
        <div class="card-body">
            <form th:action="@{/orders}" method="get" class="row g-3 align-items-end">
                <div class="col-md-4">
                    <label for="startDate" class="form-label fw-bold">Дата начала:</label>
                    <input type="date" id="startDate" name="startDate"
                           class="form-control"
                           th:value="${startDate}" required>
                </div>
                <div class="col-md-4">
                    <label for="endDate" class="form-label fw-bold">Дата окончания:</label>
                    <input type="date" id="endDate" name="endDate"
                           class="form-control"
                           th:value="${endDate}" required>
                </div>
                <div class="col-md-4">
                    <button type="submit" class="btn btn-primary w-100">
                        Показать заказы
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- ТАБЛИЦА ЗАКАЗОВ -->
    <div class="table-responsive">
        <table class="table table-hover align-middle shadow-sm">
            <thead class="table-light">
            <tr>
                <th>№ Заказа</th>
                <th>Дата оформления</th>
                <th>Сумма</th>
                <th>Пункт выдачи</th>
                <th>Статус</th>
            </tr>
            </thead>
            <tbody>
            <!-- Цикл по заказам -->
            <tr th:each="order : ${orders}">
                <td><strong>#<span th:text="${order.id}">1</span></strong></td>
                <td th:text="${#temporals.format(order.createdAt, 'dd.MM.yyyy HH:mm')}">01.01.2024</td>
                <td class="fw-bold text-primary" th:text="${order.totalAmount} + ' ₽'">0 ₽</td>
                <td>
                    <span th:if="${order.pickupPointName}" th:text="${order.pickupPointName}">Пункт</span>
                    <span th:unless="${order.pickupPointName}" class="text-muted">—</span>
                </td>
                <td><span class="badge bg-success" th:text="${order.status}">OK</span></td>
            </tr>

            <!-- Сообщение, если список пуст -->
            <tr th:if="${#lists.isEmpty(orders)}">
                <td colspan="5" class="text-center py-4 text-muted">
                    <p class="mb-2">Заказов за выбранный период не найдено.</p>
                    <small>Попробуйте расширить диапазон дат.</small>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
