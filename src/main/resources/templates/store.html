<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Магазин Электроники</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .product-card { transition: transform 0.2s; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .rating-stars { color: #ffc107; }
        .category-filter { background: #f8f9fa; padding: 20px; border-radius: 10px; margin-bottom: 30px; }
    </style>
</head>
<body>

<!-- Навигационная панель -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">Электроника</a>
        <div class="d-flex">
            <div sec:authorize="!isAuthenticated()">
                <a href="/login" class="btn btn-outline-light me-2">Войти</a>
                <a href="/register" class="btn btn-primary">Регистрация</a>
            </div>
            <div sec:authorize="isAuthenticated()">
                <span class="navbar-text text-white me-3">
                    Привет, <span sec:authentication="name">User</span>
                </span>
                <a href="/profile" class="btn btn-outline-light me-2">Профиль</a>
                <a href="/cart" class="btn btn-success position-relative">
                    Корзина
                    <span sec:authorize="isAuthenticated()"
                          th:with="cart=${session.cart}"
                          th:if="${cart != null && !cart.items.isEmpty()}"
                          class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
                        <span th:text="${cart.totalCount}">0</span>
                    </span>
                </a>

                <form th:action="@{/logout}" method="post" style="display:inline;">
                    <button type="submit" class="btn btn-danger">Выход</button>
                </form>
            </div>
        </div>
    </div>
</nav>

<div class="container">
    <h1 class="mb-4">Каталог товаров</h1>

    <!-- Фильтр по категориям -->
    <div class="category-filter">
        <h5>Категории</h5>
        <div class="d-flex flex-wrap gap-2">
            <a th:href="@{/products/}"
               class="btn"
               th:classappend="${selectedCategory == null} ? 'btn-primary' : 'btn-outline-primary'">
                Все
            </a>
            <a th:each="cat : ${categories}"
               th:href="@{/products/(categoryId=${cat.id})}"
               class="btn"
               th:classappend="${selectedCategory == cat.id} ? 'btn-primary' : 'btn-outline-primary'"
               th:text="${cat.name}">
                Категория
            </a>
        </div>
    </div>

    <div class="col-md-6 text-end">
        <label class="me-2 fw-bold">Сортировать по цене:</label>
        <div class="btn-group" role="group">

            <!-- Сортировка: По умолчанию -->
            <a th:href="@{/(sort=${null}, categoryId=${selectedCategory})}"
               class="btn btn-sm"
               th:classappend="${currentSort == null || currentSort == ''} ? 'btn-secondary active' : 'btn-outline-secondary'">
                По умолчанию
            </a>

            <!-- Сортировка: По возрастанию -->
            <a th:href="@{/(sort='asc', categoryId=${selectedCategory})}"
               class="btn btn-sm"
               th:classappend="${currentSort == 'asc'} ? 'btn-success active' : 'btn-outline-success'">
                ↑ Дешевле
            </a>

            <!-- Сортировка: По убыванию -->
            <a th:href="@{/(sort='desc', categoryId=${selectedCategory})}"
               class="btn btn-sm"
               th:classappend="${currentSort == 'desc'} ? 'btn-danger active' : 'btn-outline-danger'">
                ↓ Дороже
            </a>
        </div>
    </div>

    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
        <div class="col" th:each="product : ${products}">
            <div class="card h-100 product-card">
                <img th:src="${product.imageUrl != null ? product.imageUrl : 'https://via.placeholder.com/300'}"
                     class="card-img-top" alt="Product Image" style="height: 200px; object-fit: cover;">

                <div class="card-body d-flex flex-column">
                    <h5 class="card-title" th:text="${product.name}">Название</h5>

                    <!-- Категория -->
                    <span class="badge bg-secondary mb-2" th:text="${product.categoryName}">Категория</span>

                    <!-- Рейтинг -->
                    <div class="mb-2">
                        <span class="rating-stars">
                            <th:block th:each="i : ${#numbers.sequence(1, 5)}">
                                <span th:if="${product.averageRating >= i}">★</span>
                                <span th:if="${product.averageRating < i}">☆</span>
                            </th:block>
                        </span>
                        <small class="text-muted" th:text="${#numbers.formatDecimal(product.averageRating, 1, 1)}">0.0</small>
                    </div>

                    <div class="mt-auto">
                        <h4 class="text-primary" th:text="${product.price + ' ₽'}">0 ₽</h4>
                        <p class="small text-danger" th:if="${product.quantity == 0}">Нет в наличии</p>
                        <div sec:authorize="hasRole('CLIENT')">
                            <form th:action="@{/cart/add/{id}(id=${product.id})}" method="post">
                                <button type="submit" class="btn btn-primary w-100">В корзину</button>
                            </form>
                        </div>
                        <button th:if="${product.quantity > 0}"
                                sec:authorize="!isAuthenticated()"
                                class="btn btn-secondary w-100"
                                onclick="alert('Для покупки необходимо войти в систему')">
                            Войти для покупки
                        </button>
                    </div>
                </div>

                <div class="card-footer text-center bg-white border-0">
                    <a th:href="@{/products/{id}(id=${product.id})}" class="text-decoration-none small">
                        Подробнее и отзывы
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
